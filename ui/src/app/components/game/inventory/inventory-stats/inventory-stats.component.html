<!-- Inventory footer: weight meter + gold -->
<div class="inventory-footer">
  <div class="wt">
    <div class="wlab">
      <span class="lbl">
        <span class="material-symbols-outlined">scale</span>
        Weight
      </span>
      <b
        [class.weight-normal]="getWeightPercent() < 80"
        [class.weight-warning]="getWeightPercent() >= 80 && getWeightPercent() < 95"
        [class.weight-critical]="getWeightPercent() >= 95">
        {{ currentWeight.toFixed(1) }} / {{ carryingCapacity.toFixed(1) }} kg
      </b>
    </div>
    <div class="bar">
      <span
        [class.weight-normal]="getWeightPercent() < 80"
        [class.weight-warning]="getWeightPercent() >= 80 && getWeightPercent() < 95"
        [class.weight-critical]="getWeightPercent() >= 95"
        [style.width.%]="weightBarWidth()">
      </span>
    </div>
  </div>

  <div class="stat gold">
    <!-- Floating Gold Notifications -->
    <div class="floating-gold-container">
      @for (goldNotif of floatingGold(); track goldNotif.id) {
        <div class="floating-gold">+{{ goldNotif.amount }}g</div>
      }
    </div>

    <app-icon [path]="'ui/ui_gold.svg'" [size]="16"></app-icon>
    <span>{{ gold | number }} g</span>
  </div>
</div>
