<!-- Header -->
<div class="inventory-header">
  <h2 class="text-2xl font-bold text-gold-400">Inventory</h2>
  <div class="header-actions">
    <!-- Density Toggle -->
    <div class="view-toggle-group">
      <button
        class="button-tertiary"
        [class.active]="viewMode === 'comfortable'"
        (click)="onViewModeChange('comfortable')"
        title="Comfortable — icon, name & badges">
        <span class="material-symbols-outlined">view_agenda</span>
      </button>
      <button
        class="button-tertiary"
        [class.active]="viewMode === 'compact'"
        (click)="onViewModeChange('compact')"
        title="Compact — dense rows">
        <span class="material-symbols-outlined">view_headline</span>
      </button>
      <button
        class="button-tertiary"
        [class.active]="viewMode === 'grid'"
        (click)="onViewModeChange('grid')"
        title="Grid — icons only">
        <span class="material-symbols-outlined">grid_view</span>
      </button>
    </div>
    @if (isAltKeyHeld) {
      <div class="alt-hint">
        <span class="hint-icon">⚡</span>
        <span class="hint-text">{{ isVendorOpen ? 'Quick Sell Mode' : 'Quick Drop Mode' }}</span>
      </div>
    }
  </div>
</div>

<!-- Filters -->
<div class="filters">
  <select
    [ngModel]="selectedCategory"
    (ngModelChange)="onCategoryChange($event)"
    class="category-filter">
    @for (category of categories; track category.value) {
      <option [value]="category.value">
        {{ category.label }}
      </option>
    }
  </select>

  <input
    type="text"
    [ngModel]="searchQuery"
    (ngModelChange)="onSearchQueryChange($event)"
    placeholder="Search items..."
    class="search-input"
  />
</div>
